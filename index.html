<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amar e-Com</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#141414" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Amar e-Com" />
    <link rel="apple-touch-icon" href="https://picsum.photos/seed/amarsupply/192/192" />
  </head>
  <body>
    <div id="root">
      <style>
        .initial-loader {
          display: flex;
          height: 100vh;
          width: 100%;
          align-items: center;
          justify-content: center;
          background: #4070f4;
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }
        .initial-loader .dots {
          position: relative;
          display: flex;
          align-items: center;
          justify-content: center;
        }
        .initial-loader .dots span {
          position: absolute;
          height: 10px;
          width: 10px;
          background: #fff;
          border-radius: 50%;
          transform: rotate(calc(var(--i) * (360deg / 15))) translateY(35px);
          animation: initial-animate 1.5s linear infinite;
          animation-delay: calc(var(--i) * 0.1s);
          opacity: 0;
        }
        @keyframes initial-animate {
          0% { opacity: 1; }
          100% { opacity: 0; }
        }
      </style>
      <div class="initial-loader">
        <div class="dots">
          <span style="--i:1;"></span>
          <span style="--i:2;"></span>
          <span style="--i:3;"></span>
          <span style="--i:4;"></span>
          <span style="--i:5;"></span>
          <span style="--i:6;"></span>
          <span style="--i:7;"></span>
          <span style="--i:8;"></span>
          <span style="--i:9;"></span>
          <span style="--i:10;"></span>
          <span style="--i:11;"></span>
          <span style="--i:12;"></span>
          <span style="--i:13;"></span>
          <span style="--i:14;"></span>
          <span style="--i:15;"></span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
